server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Spotify redirect URI used by the app omits .html extension.
    location = /afterLogin {
        try_files /afterLogin.html =404;
    }

    # Serve static assets, fallback to index for angular routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
